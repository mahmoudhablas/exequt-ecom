version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  postgres:
    image: postgres:16
    container_name: postgres-db-ecom
    restart: always
    environment:
      POSTGRES_DB: ecom
      POSTGRES_USER: service
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    command: >
      postgres -c listen_addresses='*'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-for-ecom
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
volumes:
  postgres_data:
